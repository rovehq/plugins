name: Plugins — Build, Validate & Deploy (official)

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "**/*.rs"
      - "**/Cargo.toml"
      - "Cargo.lock"
  pull_request:
    branches: [main]
    paths:
      - "**/*.rs"
      - "**/Cargo.toml"
      - "Cargo.lock"
  schedule:
    # Nightly dev pre-build at 22:00 UTC — aligns with core/ so all
    # channel artifacts land on R2 before the 00:00 UTC auto-update.
    - cron: "0 22 * * *"
  workflow_dispatch: {}

env:
  CARGO_TERM_COLOR: always

jobs:
  resolve-channel:
    name: Resolve Channel
    runs-on: ubuntu-latest
    outputs:
      channel: ${{ steps.channel.outputs.channel }}
    steps:
      - id: channel
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "channel=stable" >> "$GITHUB_OUTPUT"
          else
            echo "channel=dev" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build Official WASM Plugins (${{ needs.resolve-channel.outputs.channel }})
    needs: [resolve-channel]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - uses: Swatinem/rust-cache@v2

      - name: Install wasmtools
        run: cargo install wasm-tools || true

      - name: Build and validate each plugin
        run: |
          mkdir -p artifacts/plugins

          for plugin_dir in */; do
            [ ! -f "$plugin_dir/Cargo.toml" ] && continue
            plugin_name=$(basename "$plugin_dir")

            echo "=== Building: $plugin_name ==="
            (cd "$plugin_dir" && cargo build --target wasm32-wasip1 --release)

            version=$(grep '^version' "$plugin_dir/Cargo.toml" | head -1 | sed 's/.*"\(.*\)".*/\1/')
            wasm_name=$(echo "$plugin_name" | tr '-' '_')
            wasm_path="${plugin_dir}target/wasm32-wasip1/release/${wasm_name}.wasm"

            if [ -f "$wasm_path" ]; then
              wasm-tools validate "$wasm_path" || true
              mkdir -p "artifacts/plugins/$plugin_name/$version"
              cp "$wasm_path" "artifacts/plugins/$plugin_name/$version/"
              b3sum "$wasm_path" >> artifacts/checksums.txt 2>/dev/null || sha256sum "$wasm_path" >> artifacts/checksums.txt
              echo "✓ $plugin_name v$version"
            fi
          done

      - uses: actions/upload-artifact@v4
        with:
          name: plugins-${{ needs.resolve-channel.outputs.channel }}
          path: artifacts/
          retention-days: 1

  deploy:
    name: Deploy to R2 (${{ needs.resolve-channel.outputs.channel }})
    needs: [resolve-channel, build]
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: plugins-${{ needs.resolve-channel.outputs.channel }}
          path: artifacts/

      - name: Prepare R2 directory (per-channel)
        env:
          CHANNEL: ${{ needs.resolve-channel.outputs.channel }}
        run: |
          mkdir -p ".r2_upload/${CHANNEL}/plugins"
          cp -r artifacts/plugins/* ".r2_upload/${CHANNEL}/plugins/" 2>/dev/null || true
          find .r2_upload -type f | sort

      - name: Deploy to Cloudflare R2
        uses: jakejarvis/s3-sync-action@master
        with:
          args: --acl public-read --follow-symlinks
        env:
          AWS_S3_BUCKET: ${{ secrets.R2_BUCKET_NAME }}
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_REGION: "auto"
          AWS_S3_ENDPOINT: ${{ secrets.R2_API_URL }}
          SOURCE_DIR: ".r2_upload"

  update-registry:
    name: Update Registry (${{ needs.resolve-channel.outputs.channel }})
    needs: [resolve-channel, build]
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: plugins-${{ needs.resolve-channel.outputs.channel }}
          path: artifacts/

      - name: Install b3sum
        run: sudo apt-get update && sudo apt-get install -y b3sum || cargo install b3sum

      # Writes entries to the OFFICIAL plugin manifest at
      # `<channel>/plugins/manifest.json`. Registry CI signs this file with
      # the Official key on the follow-up commit.
      - name: Update per-channel plugin manifest
        env:
          REGISTRY_PAT: ${{ secrets.REGISTRY_PAT }}
          CHANNEL: ${{ needs.resolve-channel.outputs.channel }}
        run: |
          set -e
          git clone https://x-access-token:${REGISTRY_PAT}@github.com/orvislab/rove-registry.git /tmp/registry

          COMMIT=$(git rev-parse --short HEAD)
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          R2_BASE="https://registry.roveai.co"
          GH_RAW="https://raw.githubusercontent.com/orvislab/rove-registry/main"

          MANIFEST="/tmp/registry/${CHANNEL}/plugins/manifest.json"
          mkdir -p "$(dirname "$MANIFEST")"
          if [ ! -f "$MANIFEST" ]; then
            jq -n --arg ch "$CHANNEL" --arg ts "$TIMESTAMP" '{
              schema_version: 2,
              channel: $ch,
              artifact: "plugins",
              issuer: "rove-team",
              published_at: $ts,
              entries: {},
              signature: ""
            }' > "$MANIFEST"
          fi

          for plugin_dir in artifacts/plugins/*/; do
            [ ! -d "$plugin_dir" ] && continue
            PLUGIN_NAME=$(basename "$plugin_dir")

            for version_dir in "$plugin_dir"*/; do
              [ ! -d "$version_dir" ] && continue
              VERSION=$(basename "$version_dir")

              for wasm in "$version_dir"*.wasm; do
                [ ! -f "$wasm" ] && continue
                HASH=$(b3sum "$wasm" | cut -d' ' -f1)
                SIZE=$(stat --format=%s "$wasm" 2>/dev/null || stat -f%z "$wasm" 2>/dev/null)
                WASM_FILE=$(basename "$wasm")

                REL_DIR="${CHANNEL}/plugins/${PLUGIN_NAME}/${VERSION}"
                mkdir -p "/tmp/registry/${REL_DIR}"
                cp "$wasm" "/tmp/registry/${REL_DIR}/${WASM_FILE}"

                jq --arg name "$PLUGIN_NAME" \
                   --arg ver "$VERSION" \
                   --arg url "$R2_BASE/$REL_DIR/$WASM_FILE" \
                   --arg fallback "$GH_RAW/$REL_DIR/$WASM_FILE" \
                   --arg b3 "$HASH" \
                   --argjson sz "${SIZE:-0}" \
                   '.entries[$name] = {
                     version: $ver,
                     author: "Rove Team",
                     trust_tier: 1,
                     format: "wasm",
                     url: $url,
                     fallback_url: $fallback,
                     blake3: $b3,
                     size_bytes: $sz
                   }' \
                   "$MANIFEST" > /tmp/m.json && mv /tmp/m.json "$MANIFEST"
              done
            done
          done

          jq --arg ts "$TIMESTAMP" '.published_at = $ts' "$MANIFEST" > /tmp/m.json && mv /tmp/m.json "$MANIFEST"
          # Clear signature — registry CI re-signs with Official key
          jq '.signature = ""' "$MANIFEST" > /tmp/m.json && mv /tmp/m.json "$MANIFEST"

          cd /tmp/registry
          git config user.name "rove-ci"
          git config user.email "ci@roveai.co"
          git add -A
          if git diff --cached --quiet; then
            echo "No plugin manifest changes."
          else
            git commit -m "release(${CHANNEL}): official plugins (${COMMIT})"
            git push
          fi
